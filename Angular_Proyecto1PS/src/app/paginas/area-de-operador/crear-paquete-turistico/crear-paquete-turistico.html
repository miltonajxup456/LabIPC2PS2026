<app-head [titulo]="titulo"></app-head>
<app-regreso-menu [linkAnterior]="linkAnterior"></app-regreso-menu>

<p>
    Llena los campos para que sea un paquete valido
</p>

<form class="principal" [formGroup]="formPaquete" (ngSubmit)="guardarPaquete()">
    <div>
        <label >
            Asignale un Nombre al Paquete
            <input type="text" formControlName="nombre">
        </label>
    </div>
    <div class="secundario">
        Todos los Destinos Registrados
        @for (destino of todosDestinos(); track destino.idDestino) {
            <button class="boton" type="button"
                [class.eleccion]="destino.idDestino === destinoElegido()?.idDestino"
                (click)="setDestino(destino)">
                <div> {{destino.pais}} </div>
                <div> {{destino.nombre}} </div>
            </button>
        }
    </div>

    <div class="secundario">
        Agrega una descripcion general del Paquete  
        <label >
            <textarea formControlName="descripcion" ></textarea>
        </label>
    </div>

    <div>
        <label >
            Asigna la duracion de dias
            <input type="number" formControlName="duracionDias">
        </label>
        <label >
            Asigna el Precio
            <input type="number" formControlName="precio">
        </label>
        <label >
            Asigna la Capacidad
            <input type="number" formControlName="capacidad">
        </label>
        <button class="boton" [disabled]="formPaquete.invalid">Guardar El Paquete</button>
    </div>
</form>
