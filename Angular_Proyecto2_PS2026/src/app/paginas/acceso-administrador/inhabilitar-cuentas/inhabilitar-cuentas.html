<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (usuario of usuarios(); track usuario.nombreUsuario) {
            <div class="celda">
                Nombre De Usuario: {{usuario.nombreUsuario}} <br>
                Tipo de Usuario: {{usuario.tipoRol}}
                <button class="btnRedondo" 
                [class.hab]="!usuario.baneo" 
                [class.des]="usuario.baneo" (click)="cambiar(usuario)">
                    @if (usuario.baneo) {
                        Deshabilitado
                    } @else {
                        Habilitado
                    }
                </button>
            </div>
        }
    </div>
</div>
