<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (propuesta of propuestas(); track propuesta.idPropuestaCategoria) {
            <button class="btnRedondo" 
            (click)="elegirPropuesta(propuesta)"
            [class.seleccionado]="propuesta.idPropuestaHabilidad === propuestaElegida()?.idPropuestaHabilidad">
                Nombre: {{propuesta.nombre}}
            </button>
        } @empty {
            <div class="celda">
                No hay propuestas de Habilidades pendientes
            </div>
        }
    </div>
    @if (propuestaElegida()) {
        <form [formGroup]="formCategoria" (ngSubmit)="aprobarCategoria()">
            <label >
                Nombre de la Habilidad:
                <input type="text" formControlName="nombreCategoria">
            </label>
            <label >
                Descripcion de la Habilidad
                <textarea rows="10" cols="30" formControlName="descripcion"></textarea>
            </label>
            <button class="btnRedondo">Aprobar Habilidad</button>
        </form>
    }
</div>
