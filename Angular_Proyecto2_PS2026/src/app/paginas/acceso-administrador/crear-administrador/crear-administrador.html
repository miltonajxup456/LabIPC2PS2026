<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <form [formGroup]="formRegistro" (ngSubmit)="guardarUsuario()">
        <label >
            Ingresa el nombre de Usuario:
            <input type="text" formControlName="nombreUsuario">
        </label>
        <label >
            Ingresa un nombre para identificarte:
            <input type="text" formControlName="nombre">
        </label>
        <label >
            Contraseña:
            <input type="text" formControlName="passwordUser">
        </label>
        <label >
            Correo Electronico:
            <input type="email" formControlName="correoElectronico">
        </label>
        <label >
            Telefono:
            <input type="text" formControlName="telefono">
        </label>
        <label >
            Direccion:
            <input type="text" formControlName="direccion">
        </label>
        <label >
            CUI:
            <input type="text" formControlName="cui">
        </label>
        <label >
            Fecha de Nacimiento:
            <input type="date" formControlName="fechaNac">
        </label>
        <button class="btnRedondo" [disabled]="!formRegistro.valid">Registrar</button>
        <button class="btnRedondo" (click)="vaciar()">Vaciar Formulario</button>
    </form>
</div>
