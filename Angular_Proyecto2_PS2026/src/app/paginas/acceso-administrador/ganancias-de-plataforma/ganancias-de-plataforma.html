<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <label >
        Fecha Inicial:
        <input type="date" [(ngModel)]="fechaInicial">
    </label>
    <label >
        Fecha Final:
        <input type="date" [(ngModel)]="fechaFinal">
    </label>
</div>
<div class="contPrincipal">
    <button class="btnRedondo" (click)="llamarGanancias()" [disabled]="!fechaInicial || !fechaFinal">Buscar Ganancias</button>
</div>
<div class="contPrincipal">
    <div class="contSecundario">
        @if (gananacias()) {
            <div class="celda">
                <div class="celda"> Ganancias Totales: {{gananacias()?.ganancias}} </div>
                <div class="celda"> Contratos Completados: {{gananacias()?.contratosCompletados}} </div>
            </div>
        } @else {
            <div class="celda">No se tienen registros de Proyectos termindos en estas fechas</div>
        }
    </div>
</div>
