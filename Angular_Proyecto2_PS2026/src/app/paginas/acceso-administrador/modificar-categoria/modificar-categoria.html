<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (categoria of categorias(); track categoria.idCategoria) {
            <button class="btnCuadrado" [class.seleccionado]="categoria.idCategoria === categoriaElegida()?.idCategoria"
            (click)="elegirCategoria(categoria)">
                {{categoria.nombreCategoria}}
            </button>
        }
    </div>
    @if (categoriaElegida()) {
        <form [formGroup]="formCategoria" (ngSubmit)="actualizarCategoria()">
            <div class="celda"> Id de Categoria: {{categoriaElegida()?.idCategoria}} </div>
            <label >
                Nombre de Categoria:
                <input type="text" formControlName="nombreCategoria">
            </label>
            <label >
                Descripcion de la Categoria:
                <textarea rows="10" cols="30" formControlName="descripcion"></textarea>
            </label>
            <button class="btnRedondo" [disabled]="formCategoria.invalid">Actualizar Categoria</button>
        </form>
    }
</div>
