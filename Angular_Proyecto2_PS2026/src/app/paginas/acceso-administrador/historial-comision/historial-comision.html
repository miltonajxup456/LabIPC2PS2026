<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (comision of comisiones(); track comision.idComision) {
            <div class="celda">
                <div class="celda"> Porcentaje de comision: {{comision.porcentaje}}% </div>
                <div class="celda"> Fecha de Inicio: {{comision.fechaInicio}} </div>
                @if (!comision.fechaFinal) {
                    <div class="celda"> Fecha Final: Comision Actual </div>
                } @else {
                    <div class="celda"> Fecha Final: {{comision.fechaFinal}} </div>
                }
            </div>
        }
    </div>
</div>
