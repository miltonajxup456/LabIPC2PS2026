<app-header [titulo]="titulo"></app-header>

<div class="espacio"></div>
<div class="contPrincipal">
    <button class="btnCuadrado" (click)="registro()">
        Registrarse
    </button>
</div>

<div class="contPrincipal">
    <form [formGroup]="formLogin" (ngSubmit)="ingresarAlSistema()">
        <label >
            Nombre de Usuario:
            <input type="text" formControlName="nombreUsuario">
        </label>
        <label >
            Contraseña:
            <input type="password" formControlName="passwordUser">
        </label>
        <button class="btnCuadrado" >Ingresar</button>
    </form>
</div>
