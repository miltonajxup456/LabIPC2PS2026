<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <label >
        Fecha Inicial:
        <input type="date" [(ngModel)]="fechaInicial">
    </label>
    <label >
        Fecha Final:
        <input type="date" [(ngModel)]="fechaFinal">
    </label>
</div>
<div class="contPrincipal">
    <button class="btnRedondo" (click)="llamarProyectos()" [disabled]="!fechaInicial || !fechaFinal">Buscar Contratos</button>
</div>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (propuesta of propuestas(); track propuesta.idPropuesta) {
            <div class="celda">
                <div class="celda"> Id del Proyecto: {{propuesta.proyecto}} </div>
                <div class="celda"> Monto Ofertado: {{propuesta.montoOfertado}} </div>
                <div class="celda"> Estado de la Propuesta {{propuesta.tipoEstado}} </div>
                <div class="celda"> Fecha: {{propuesta.fecha}} </div>
            </div>
        } @empty {
            <div class="celda">No se tienen registros de pagos en estas fechas</div>
        }
    </div>
</div>
