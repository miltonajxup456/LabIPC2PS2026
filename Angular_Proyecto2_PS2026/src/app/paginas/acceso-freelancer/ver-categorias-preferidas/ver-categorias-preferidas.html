<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (categoria of categorias(); track $index) {
            <div class="celda">
                <div class="celda"> Nombre de Categoria: {{categoria.nombreCategoria}} </div>
                <div class="celda"> Cantidad de Contratos: {{categoria.cantidadContratos}} </div>
                <div class="celda"> Total de Ingresos: {{categoria.totalIngresos}} </div>
            </div>
        }
    </div>
</div>
