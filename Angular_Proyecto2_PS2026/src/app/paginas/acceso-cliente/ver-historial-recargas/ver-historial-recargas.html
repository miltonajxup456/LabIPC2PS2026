<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (recarga of recargas(); track recarga.idRecarga) {
            <div class="celda">
                <div class="celda"> Id Recarga: {{recarga.idRecarga}} </div>
                <div class="celda"> Monto: {{recarga.monto}} </div>
                <div class="celda"> Fecha: {{recarga.fecha}} </div>
            </div>
        } @empty {
            <div class="celda">No se tienen registros de Proyectos creados en estas fechas</div>
        }
    </div>
</div>
