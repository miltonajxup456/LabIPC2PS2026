<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <label >
        Fecha Inicial:
        <input type="date" [(ngModel)]="fechaInicial">
    </label>
    <label >
        Fecha Final:
        <input type="date" [(ngModel)]="fechaFinal">
    </label>
</div>
<div class="contPrincipal">
    <button class="btnRedondo" (click)="llamarProyectos()" [disabled]="!fechaInicial || !fechaFinal">Buscar Gastos</button>
</div>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (gasto of gastos(); track gasto.nombreCategoria) {
            <div class="celda">
                <div class="celda"> Nombre de Categoria: {{gasto.nombreCategoria}} </div>
                <div class="celda"> Gasto Total: {{gasto.total}} </div>
            </div>
        } @empty {
            <div class="celda">No se tienen registros de pagos en estas fechas</div>
        }
    </div>
</div>
