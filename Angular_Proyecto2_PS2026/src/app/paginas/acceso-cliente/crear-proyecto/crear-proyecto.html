<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<app-completar-datos accion="poder publicar un proyecto" ></app-completar-datos>
<div class="celda">Comision de la plataforma para los proyectos: {{comisionProyecto()?.porcentaje}}% </div>
<div class="contPrincipal">
    <form [formGroup]="formProyecto" (ngSubmit)="guardarProyecto()">
        <label >
            Titulo:
            <input type="text" formControlName="titulo">
        </label>
        <label >
            Descripcion:
            <textarea rows="10" cols="50" type="text" formControlName="descripcion"></textarea>
        </label>
        <label >
            Presupuesto:
            <input type="number" formControlName="presupuesto">
        </label>
        <label >
            Fecha Limite:
            <input type="date" formControlName="fechaLimite">
        </label>
        <button class="btnRedondo" [disabled]="formProyecto.invalid || !puedePublicar()">Subir Proyecto</button>
    </form>
    <div>
        Elige la categoria del Proyecto
        <div class="contSecundario">
            @for(categoria of categorias(); track categoria.idCategoria) {
                <button class="btnCuadrado" 
                [class.seleccionado]="categoria.idCategoria === categoriaElegida()"
                (click)="elegirCategoria(categoria.idCategoria!) ">
                    {{categoria.nombreCategoria}}
                </button>
            }
        </div>
    </div>
</div>
<div class="espacio"></div>
