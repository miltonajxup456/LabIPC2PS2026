<app-header [titulo]="titulo"></app-header>
<app-menu-secundario [linkAnterior]="linkAnterior"></app-menu-secundario>
<div class="contPrincipal">
    <div class="contSecundario">
        @for (proyecto of  proyectosCliente(); track proyecto.idProyecto) {
            <button class="btnCuadrado" 
            [class.seleccionado]="proyecto.idProyecto === proyectoElegido()?.idProyecto" 
            (click)="elegirProyecto(proyecto)" 
            [disabled]="proyecto.estado !== 1">
            @if (proyecto.estado !== 1) {
                <p>No es posible modificar este Proyecto <br>Estado: {{proyecto.tipoEstado}} </p>
            }
                Titulo: {{proyecto.titulo}}
            </button>
        } @empty {
            <div class="celda">
                No se han creado proyectos aun
            </div>
        }
    </div>

    <form [formGroup]="formProyecto" (ngSubmit)="guardarCambios()">
        <div class="celda">Comision del Proyecto: {{comisionProyecto()?.porcentaje}}% </div>
        <label >
            Titulo:
            <input type="text" formControlName="titulo">
        </label>
        <label >
            Descripcion:
            <textarea rows="10" cols="50" type="text" formControlName="descripcion"></textarea>
        </label>
        <label >
            Presupuesto:
            <input type="number" formControlName="presupuesto">
        </label>
        <label >
            Fecha Limite:
            <input type="date" formControlName="fechaLimite">
        </label>
        <button class="btnRedondo" [disabled]="formProyecto.invalid">Guardar Cambios</button>
    </form>
    <div>
        Elige la categoria del Proyecto
        <div class="contSecundario">
            @for(categoria of categorias(); track categoria.idCategoria) {
                <button class="btnCuadrado" 
                [class.seleccionado]="categoria.idCategoria === categoriaID"
                (click)="elegirCategoria(categoria.idCategoria!) ">
                    {{categoria.nombreCategoria}}
                </button>
            }
        </div>
    </div>
</div>
